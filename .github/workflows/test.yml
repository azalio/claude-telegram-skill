name: e2e

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: e2e tests (structure + routing, no token, mocked Telegram API)
        run: python3 -W error::ResourceWarning tests/test_e2e.py

      - name: Validate plugin & marketplace schema (best-effort)
        continue-on-error: true
        run: |
          curl -fsSL https://claude.ai/install.sh | bash || curl -fsSL https://downloads.claude.ai/install.sh | bash || true
          export PATH="$HOME/.local/bin:$PATH"
          if command -v claude >/dev/null; then
            claude plugin validate . --strict || true
          else
            echo "claude CLI unavailable in CI — skipping schema validation"
          fi
